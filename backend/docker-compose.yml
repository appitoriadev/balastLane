services:
  # PostgreSQL Database
  db:
    image: postgres:17-alpine
    container_name: expenseTrackerDb
    networks:
      - expenseTrackerNetwork
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ${HOME}/balastlane_data/postgres:/var/lib/postgresql/data
      - ./Data/Schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # BalastLane API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expenseTracker-api
    networks:
      - expenseTrackerNetwork
    environment:
      CONNECTIONSTRINGS_EXPENSETRACKER: ${CONNECTIONSTRINGS_EXPENSETRACKER}
      JWT_KEY: ${JWT_KEY}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_EXPIRYMINUTES: ${JWT_EXPIRYMINUTES}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
    ports:
      - "5157:8080"
      - "5158:8443"
    depends_on:
      db:
        condition: service_healthy

networks:
  expenseTrackerNetwork:
    driver: bridge
